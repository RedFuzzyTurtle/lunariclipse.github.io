<!DOCTYPE html>
<html>
  <head>
    <title>Lexical Decision Task</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
      /* Styling for the task text */
      .stimulus-text {
        font-size: 48px;
        font-family: Arial, sans-serif;
      }
      .mask-text {
        font-size: 48px;
        font-family: monospace;
        letter-spacing: 5px;
      }
      /* Persistent counter styling */
      #trial-counter-container {
        position: fixed;
        top: 20px;
        right: 20px;
        font-size: 18px;
        font-family: Arial, sans-serif;
        color: #555;
        z-index: 10000; /* Stays on top of everything */
        background-color: rgba(255, 255, 255, 0.7);
        padding: 8px;
        border-radius: 4px;
        pointer-events: none; /* Prevents the box from blocking clicks */
      }

      #jspsych-target {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="trial-counter-container"></div>
    <div id="jspsych-target">
    <script>
      // 1. Initialize jsPsych
      const jsPsych = initJsPsych({
        display_element: 'jspsych-target'
      });

      // 2. Setup Data Management
      const subject_id = jsPsych.randomization.randomID(10);
      const filename = `${subject_id}.csv`;

      // 3. Trial Counter Variables
      let trial_count = 96;

      function updateCounter() {
        const counterDiv = document.getElementById('trial-counter-container');
        if (counterDiv) {
          counterDiv.innerHTML = `Trials remaining: ${trial_count}`;
        }
      }

      const timeline = [];

      // Welcome & Instructions
      const instructions = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <h2>Welcome to the experiment!</h2>
          <p>In this task, you will see a fixation cross (+), followed by flashes on the screen.</p>
          <p>After the flashes, a target word will appear in <strong>UPPERCASE</strong> letters.</p>
          <br>
          <p>Press the <strong>'F'</strong> key if the target is a real <strong>WORD</strong>.</p>
          <p>Press the <strong>'J'</strong> key if the target is a <strong>NON-WORD</strong>.</p>
          <br>
          <p>Press SPACE to begin.</p>
        `,
        on_finish: function() {
          updateCounter(); // Show counter as soon as task starts
        }
      };
      timeline.push(instructions);

      // Helper for random number mask
      function generateMask() {
        let mask = "";
        for (let i = 0; i < 8; i++) {
          mask += Math.floor(Math.random() * 10); 
        }
        return `<div class="mask-text">${mask}</div>`;
      }

      // --- Trial Components ---

      const fixation_trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div class="stimulus-text">+</div>',
        choices: "NO_KEYS",
        trial_duration: 1000,
        on_start: function() {
          updateCounter(); // Refresh counter visibility
        }
      };

      const mask_trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: generateMask, 
        choices: "NO_KEYS",      
        trial_duration: 500
      };

      const prime_trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
          return `<div class="stimulus-text">${jsPsych.timelineVariable('prime')}</div>`;
        },
        choices: "NO_KEYS",
        trial_duration: 55
      };

      const target_trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
          return `<div class="stimulus-text"><strong>${jsPsych.timelineVariable('target')}</strong></div>`;
        },
        choices: ['f', 'j'],
        trial_duration: 3000, 
        post_trial_gap: 1000,
        data: {
          task: 'response',
          correct_response: jsPsych.timelineVariable('correct_key'),
          word_prime: jsPsych.timelineVariable('word_prime'),
          related: jsPsych.timelineVariable('related')
        },
        on_finish: function(data){
          data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
          // Decrement and update the counter visible on screen
          trial_count--;
          updateCounter();
        }
      };

      // 4. Define All 96 Stimuli
      const trial_procedure = {
        timeline: [fixation_trial, mask_trial, prime_trial, target_trial],
        timeline_variables: [
          { prime: 'awtsfelu', target: 'WASTEFUL', correct_key: 'f', word_prime: true, related: true },
          { prime: 'acpmiang', target: 'CAMPAIGN', correct_key: 'f', word_prime: true, related: true },
          { prime: 'uhimilyt', target: 'HUMILITY', correct_key: 'f', word_prime: true, related: true },
          { prime: 'poitimms', target: 'OPTIMISM', correct_key: 'f', word_prime: true, related: true },
          { prime: 'ibtrdhya', target: 'BIRTHDAY', correct_key: 'f', word_prime: true, related: true },
        ],
        randomize_order: true
      };
      timeline.push(trial_procedure);

      // DataPipe Save Trial
      const save_data = {
        type: jsPsychPipe,
        action: "save",
        experiment_id: "EdgPVNgZq20s", 
        filename: filename,
        data_string: () => jsPsych.data.get().csv(),
        on_start: function() {
          // Hide counter when experiment ends
          document.getElementById('trial-counter-container').style.display = 'none';
        }
      };
      timeline.push(save_data);

      // Final message
      const debrief = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <p>Data saved successfully!</p>
          <p>Participant ID: ${subject_id}</p>
          <p>If you wish to know your results, send your participant ID <a href="https://forms.gle/w76aPJcjETQm9NG79" target="_blank" rel="noopener noreferrer">
       here<a>.<p>
          <p>You can close the tab ^^</p>
        `
      };
      timeline.push(debrief);

      // Run
      jsPsych.run(timeline);
    </script>
    </div>
  </body>
</html>
